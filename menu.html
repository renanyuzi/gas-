<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>メニュー</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        .container {
            text-align: center;
        }

        .button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            border-radius: 8px;
        }

        iframe {
            width: 100%;
            height: 80vh;
            border: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>メニュー</h1>
        <button class="button" onclick="showScheduleForm()">業務日報</button>
        <button class="button" onclick="showDailyReportList()">日報一覧</button>
        <iframe id="contentFrame"></iframe>
    </div>

    <script>
        function showScheduleForm() {
            google.script.run.withSuccessHandler(function(html) {
                document.getElementById('contentFrame').srcdoc = html;
                hideMenu();
            }).getFormPage();
        }

        function showDailyReportList() {
            google.script.run.withSuccessHandler(function(html) {
                document.getElementById('contentFrame').srcdoc = html;
                hideMenu();
            }).getDailyReportListPage();
        }

        function hideMenu() {
            document.querySelector('.container').style.display = 'none';
        }
    </script>
</body>
</html>
